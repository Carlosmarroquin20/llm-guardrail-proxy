name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the project's stated floor; 3.11 and 3.12 are the
        # ceiling versions actively used by contributors. Skipping
        # 3.13 because it has not yet been ratified as a target.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install (with dev + duckdb extras)
        run: pip install -e ".[dev,duckdb]"
      - name: Run base test suite
        run: pytest -q

  test-with-pii:
    name: Tests (Python 3.11, [pii] extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install (with [pii] extra)
        run: pip install -e ".[dev,duckdb,pii]"
      - name: Download spaCy model
        # The model wheel is ~13 MB. Caching the pip-managed install
        # directory keeps repeat runs cheap.
        run: python -m spacy download en_core_web_sm
      - name: Run full test suite
        run: pytest -q

  dogfood:
    name: Self-scan via the composite action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ``uses: ./`` references the composite action at the repo root.
      # This validates the action contract against this very PR.
      - name: Scan the repo's own prompt fixtures
        uses: ./
        with:
          files: "tests/**/*.json scripts/**/*.json"
